# action.yml
name: vcert-cli-installer
author: Venafi
description: Installs vCert CLI and includes it in your path
branding:
  icon: package
  color: orange
# This is pinned to the last major release, we have to bump it for each action version.
inputs:
  release:
    description: vCert CLI release version to be installed
    required: false
    default: v5.11.1
  install-dir:
    description: Where to install the vCert CLI binary
    required: false
    default: $HOME/.vcert
  use-sudo:
    description: Set to true if install-dir location requires sudo privs
    required: false
    default: 'false'
  verify:
    description: Set to true if you want to verify the archive with cosign
    required: false
    default: 'false'
runs:
  using: composite
  steps:
    - shell: bash
      env:
        RELEASE: ${{ inputs.release }}
        INSTALL_DIR: ${{ inputs.install-dir }}
        USE_SUDO: ${{ inputs.use-sudo }}
      run: |
        #!/bin/bash

        shopt -s expand_aliases

        if [ -z "$NO_COLOR" ]; then
          alias log_info="echo -e \"\033[1;32mINFO\033[0m:\""
          alias log_error="echo -e \"\033[1;31mERROR\033[0m:\""
        else
          alias log_info="echo \"INFO:\""
          alias log_error="echo \"ERROR:\""
        fi

        set -e

        semver='^v([0-9]+\.){0,2}(\*|[0-9]+)(-?r?c?)(\.[0-9]+)$'
        if [[ "$RELEASE" =~ $semver ]]; then
          log_info "Custom version '$RELEASE' requested"
        else
          log_error "Unable to validate requested version: '$RELEASE'"
          exit 1
        fi

        mkdir -p "$INSTALL_DIR"

        trap "popd >/dev/null" EXIT

        pushd "$INSTALL_DIR" > /dev/null

        case ${{ runner.os }} in
          Linux)
            case ${{ runner.arch }} in
              X64)
                release_archive='linux.zip'
                ;;

              ARM64)
                release_archive='linux_arm.zip'
                ;;

              *)
                log_error "unsupported architecture ${{ runner.arch }}"
                exit 1
                ;;
            esac
            ;;

          macOS)
            case ${{ runner.arch }} in
              X64)
                release_archive='darwin.zip'
                ;;

              ARM64)
                release_archive='darwin_arm.zip'
                ;;

              *)
                log_error "unsupported architecture ${{ runner.arch }}"
                exit 1
                ;;
            esac
            ;;

          Windows)
            case ${{ runner.arch }} in
              X64)
                release_archive='windows.zip'
                ;;

              *)
                log_error "unsupported architecture ${{ runner.arch }}"
                exit 1
                ;;
            esac
            ;;

          *)
            log_error "unsupported os ${{ runner.os }}"
            exit 1
            ;;
        esac

        SUDO=
        if [[ "$USE_SUDO" == "true" ]] && command -v sudo >/dev/null; then
          SUDO=sudo
        fi

        release_archive=vcert_${RELEASE}_${release_archive}
        release_archive_url=https://github.com/Venafi/vcert/releases/download/${RELEASE}/${release_archive}

        log_info "Downloading vCert CLI version '$RELEASE'...\n      ${release_archive_url}"
        $SUDO curl -sL ${release_archive_url} -o ${release_archive}

        case ${{ runner.os }} in
          Linux)
            $SUDO unzip ${release_archive}
            if [[ ${{ runner.arch }} == 'ARM64' ]]; then
              mv vcert_arm vcert
            fi
            ;;
          macOS)
            $SUDO unzip ${release_archive}
            if [[ ${{ runner.arch }} == 'ARM64' ]]; then
              mv vcert_arm vcert
            fi
            ;;
          Windows)
            $SUDO unzip ${release_archive}
            ;;

          *)
            log_error "unsupported os ${{ runner.os }}"
            exit 1
            ;;
        esac

        $SUDO rm ${release_archive}
        $SUDO chmod +x vcert

        log_info "Installation complete!"

    - if: ${{ runner.os == 'Linux' || runner.os == 'macOS' }}
      env:
        INSTALL_DIR: ${{ inputs.install-dir }}
      run: echo "$INSTALL_DIR" >> $GITHUB_PATH
      shell: bash
    - if: ${{ runner.os == 'Windows' }}
      env:
        INSTALL_DIR: ${{ inputs.install-dir }}
      run: echo "$env:INSTALL_DIR" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      shell: pwsh